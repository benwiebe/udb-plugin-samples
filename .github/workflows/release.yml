name: Build and Release Plugin

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build plugin
        run: make build

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: udb-plugin-samples.so
